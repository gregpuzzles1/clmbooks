{{ $description := .Params.Summary | default .Params.Description | default .Site.Params.description }}
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{{ if .IsHome }}{{ .Site.Title | emojify }}{{ else }}{{ .Title | plainify | emojify }}{{ end }}">
{{ with $description }}
  <meta name="twitter:description" content="{{ . | plainify }}">
{{ end }}
